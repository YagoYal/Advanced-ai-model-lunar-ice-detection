version: "3.9"

services:
  backend:
    build: .
    container_name: lunar-backend
    env_file:
      - backend/.env
    environment:
      - DATA_MODE=${DATA_MODE:-real}
      - ENV=${ENV:-production}
      - API_KEY=${API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://seu-frontend.vercel.app}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./model:/app/model
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
